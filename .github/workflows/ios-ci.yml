name: iOS CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Xcode version
        run: xcodebuild -version
      - name: Check production config
        run: node Scripts/check-production-config.mjs
      - name: Build Fluffy Debug
        run: |
          xcodebuild \
            -project Fluffy.xcodeproj \
            -scheme Fluffy \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Build Fluffy Release
        run: |
          xcodebuild \
            -project Fluffy.xcodeproj \
            -scheme Fluffy \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
